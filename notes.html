<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTES</title>

  <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
  background-color: #4460AA;
  color: white;
  font-family: "Trebuchet MS", sans-serif;
  text-align: center;
}

    .contenedor {
      width: 100%;
      max-width: 500px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    label {
      font-size: 20px;
    }

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  font-family: "Trebuchet MS", sans-serif;

  background: transparent;
  border: 1.5px solid white;
  color: #ffffff;
  transition: transform 0.5s ease, color 0.5s ease;
}

button:hover {
  transform: scale(1.2);
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 18px;
  padding: 10px;
  font-family: "Trebuchet MS", sans-serif;

  background-color: white !important;
  color: black;
  border: none;
  border-radius: 5px;

  -webkit-appearance: none;
}

@keyframes spinY {
  from {
    transform: rotateY(0deg);
  }
  to {
    transform: rotateY(360deg);
  }
}

.spin-n {
  animation: spinY 12s linear infinite;
  display: inline-block;
  transform-style: preserve-3d;
}



  </style>
</head>

<body>

  <div class="contenedor">
    <h2>Enviar Notas</h2>

    <form id="form">

      <textarea name="message" placeholder="Escribe tus notas..." required></textarea>

      <br><br>

      <label>
        <input type="checkbox" id="urgente">
        Urgente
      </label>

      <br><br>

      <button type="submit">Enviar</button>


    </form>

<div style="margin-top:120px; display:flex; justify-content:center;">
  
  <div style="
    width:220px;
    height:220px;
    border:2px solid white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    
    <div class="spin-n" style="
      color:white;
      font-size:160px;
      font-weight:bold;
    ">
      N
    </div>

  </div>
</div>


  </div>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init({
  publicKey: "5EsBv0Ay5DyiR8pSs"
});

const form = document.getElementById("form");
const textarea = form.querySelector("textarea");
const checkbox = document.getElementById("urgente");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const message = textarea.value.trim();
  const now = new Date();

const time =
  String(now.getDate()).padStart(2, "0") + "/" +
  String(now.getMonth() + 1).padStart(2, "0") + "/" +
  String(now.getFullYear()).slice(-2) + " " +
  String(now.getHours()).padStart(2, "0") + ":" +
  String(now.getMinutes()).padStart(2, "0");

const urgent = checkbox.checked ? "Urgente." : "";

  const subject = checkbox.checked
    ? "🚨 " + message.substring(0, 100)
    : "📝 " + message.substring(0, 100);

  emailjs.send("service_s4ozhif", "template_39rv41s", {
    subject,
    message,
    time,
    urgent
  }).then(() => {
    form.reset();
  }).catch((error) => {
    console.error(error);
    alert("Error al enviar ❌");
  });
});

</script>


</body>
</html>
