<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTES</title>

  <style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  background-color: #4460AA;
  color: white;
  font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
  text-align: center;
}

    .contenedor {
      width: 100%;
      max-width: 500px;
    }

  h2 {
  font-size: 32px;
  margin-top: 5px;
  margin-bottom: 20px;
}

    label {
      font-size: 20px;
    }

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;

  background: transparent;
  border: 1.5px solid white;
  color: #ffffff;
  transition: transform 0.5s ease, color 0.5s ease;
}

button:hover {
  transform: scale(1.2);
}

textarea {
  width: 100%;
  height: 200px;
  font-size: 16px;
  padding: 10px;
  font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;

  background-color: white !important;
  color: black;
  border: none;
  border-radius: 5px;

  -webkit-appearance: none;
}

@keyframes spinY {
  from {
    transform: rotateY(0deg);
  }
  to {
    transform: rotateY(360deg);
  }
}

.spin-n {
  animation: spinY 12s linear infinite;
  display: inline-block;
  transform-style: preserve-3d;
}

#fireworks {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #FFFF00;
  border-radius: 50%;
  opacity: 1;
  box-shadow: none;
  filter: none;
  animation: explode 8000ms cubic-bezier(.16,.84,.44,1) forwards;
}

.btn-enviado {
  color: #FFFF00 !important;
  border-color: #FFFF00 !important;
}


@keyframes explode {
  0% {
    transform: translate(0,0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(0.5);
    opacity: 0;
  }
}




  </style>
</head>

<body>

  <div class="contenedor">


<div style="display:flex; justify-content:center;">
  
<div style="
  width:120px;
  height:120px;
  border:2px solid white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin: 0 auto 20px auto;
">
  
  <div class="spin-n" style="
    color:white;
    font-size:87px;
    font-weight:bold;
  ">
    N
  </div>
 </div>
</div>


    <h2>Enviar Notas</h2>

    <form id="form">

      <textarea name="message" placeholder="Escribe tus notas..." required></textarea>

      <br><br>

      <label>
        <input type="checkbox" id="urgente">
        Urgente
      </label>

      <br><br>

      <button type="submit">Enviar</button>


</form>

</div>


<div id="fireworks"></div>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

const form = document.getElementById("form");
const textarea = form.querySelector("textarea");
const checkbox = document.getElementById("urgente");
const button = form.querySelector("button");
const originalButtonText = button.textContent;

let isSending = false;

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  if (isSending) return;
  isSending = true;

  button.disabled = true;
  button.textContent = "Enviando...";

  const message = textarea.value.trim();
  const now = new Date();

  const time =
    String(now.getDate()).padStart(2, "0") + "/" +
    String(now.getMonth() + 1).padStart(2, "0") + "/" +
    String(now.getFullYear()).slice(-2) + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0");

  const urgent = checkbox.checked ? "Urgente." : "";

  const subject = checkbox.checked
    ? "🚨 " + message.substring(0, 100)
    : "📝 " + message.substring(0, 100);

  try {
    const response = await fetch("https://splitforms.com/api/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        access_key: "3e7161cd02e8450f95d97f1ed1d184a7",
        subject,
        message,
        time,
        urgent
      })
    });

    if (!response.ok) throw new Error("Error en envío");

    form.reset();

    button.textContent = "ENVIADO";
    button.classList.add("btn-enviado");

    const rect = button.getBoundingClientRect();

    fireworks(
      rect.left + rect.width / 2,
      rect.top + rect.height / 2
    );

    setTimeout(() => {
      button.textContent = originalButtonText;
      button.classList.remove("btn-enviado");
      button.disabled = false;
      isSending = false;
    }, 2000);

  } catch (error) {
    console.error(error);
    alert("Error al enviar ❌");

    button.disabled = false;
    button.textContent = originalButtonText;
    isSending = false;
  }
});

function fireworks(x, y) {
  const container = document.getElementById("fireworks");

  for (let i = 0; i < 100; i++) {
    const particle = document.createElement("div");
    particle.classList.add("particle");

    const angle = (Math.PI * 2 / 25) * i + (Math.random() * 0.3);

    const maxDistance = Math.max(window.innerWidth, window.innerHeight);
    const distance = Math.random() * maxDistance;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    particle.style.left = x + "px";
    particle.style.top = y + "px";
    particle.style.setProperty("--x", dx + "px");
    particle.style.setProperty("--y", dy + "px");

    container.appendChild(particle);

    setTimeout(() => particle.remove(), 8000);
  }
}

</script>

</body>
</html>
