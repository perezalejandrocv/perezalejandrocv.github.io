<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTES</title>

  <style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  background-color: #4460AA;
  color: white;
  font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
  text-align: center;
}

.contenedor {
  width: 100%;
  max-width: 500px;
}

h2 {
  font-size: 32px;
  margin: 5px 0 20px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  background: transparent;
  border: 1.5px solid white;
  color: white;
  transition: transform 0.3s ease;
}

button:hover {
  transform: scale(1.1);
}

textarea {
  width: 100%;
  height: 200px;
  font-size: 16px;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

#fireworks {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #FFFF00;
  border-radius: 50%;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y)) scale(0.3);
    opacity: 0;
  }
}
  </style>
</head>

<body>

<div class="contenedor">

  <h2>Enviar Notas</h2>

<form id="form"
  action="https://formslist.com/f/DMofB3fNwlvo"
  method="POST">

  <textarea id="message" name="message"
    placeholder="Escribe tus notas..." required></textarea>

  <br><br>

  <label>
    <input type="checkbox" id="urgente">
    Urgente
  </label>

  <br><br>

  <button type="submit">Enviar</button>
</form>

</div>

<div id="fireworks"></div>

<script>

const form = document.getElementById("form");
const textarea = document.getElementById("message");
const checkbox = document.getElementById("urgente");
const button = form.querySelector("button");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const message = textarea.value.trim();

  const prefix = checkbox.checked ? "🚨 " : "📝 ";

  // 🔥 SUBJECT FINAL (120 caracteres máximo)
  const subject = prefix + message.substring(0, 120);

  // 👉 SOLO enviamos esto a Formslist
  textarea.value = subject;

  button.disabled = true;
  button.textContent = "ENVIANDO...";

  const rect = button.getBoundingClientRect();
  if (typeof fireworks === "function") {
    fireworks(rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  setTimeout(() => {
    form.submit();
  }, 800);
});

function fireworks(x, y) {
  const container = document.getElementById("fireworks");

  for (let i = 0; i < 80; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 250;

    p.style.left = x + "px";
    p.style.top = y + "px";
    p.style.setProperty("--x", Math.cos(angle) * dist + "px");
    p.style.setProperty("--y", Math.sin(angle) * dist + "px");

    container.appendChild(p);

    setTimeout(() => p.remove(), 1200);
  }
}

</script>

</body>
</html>
