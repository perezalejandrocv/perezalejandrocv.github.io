<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTES</title>

  <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
  background-color: #4460AA;
  color: white;
  font-family: "Trebuchet MS", sans-serif;
  text-align: center;
}

    .contenedor {
      width: 100%;
      max-width: 500px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    label {
      font-size: 20px;
    }

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  font-family: "Trebuchet MS", sans-serif;

  transition: transform 0.2s ease, background-color 0.2s ease;
}

button:hover {
  transform: scale(1.1);
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 18px;
  padding: 10px;
  font-family: "Trebuchet MS", sans-serif;

  background-color: white !important;
  color: black;
  border: none;
  border-radius: 5px;

  -webkit-appearance: none;
}

  </style>
</head>

<body>

  <div class="contenedor">
    <h2>Enviar Notas</h2>

    <form id="form">

      <textarea name="message" placeholder="Escribe tus notas..." required></textarea>

      <br><br>

      <label>
        <input type="checkbox" id="urgente">
        Urgente
      </label>

      <br><br>

      <button type="submit">Enviar</button>

    </form>
  </div>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init({
  publicKey: "5EsBv0Ay5DyiR8pSs"
});

const form = document.getElementById("form");
const textarea = form.querySelector("textarea");
const checkbox = document.getElementById("urgente");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const message = textarea.value.trim();
  const time = new Date().toLocaleString();

  const subject = checkbox.checked
    ? "🚨 " + message.substring(0, 100)
    : "📝 " + message.substring(0, 100);

  emailjs.send("service_s4ozhif", "template_39rv41s", {
    subject,
    message,
    time
  }).then(() => {
    alert("Enviado ✔️");
    form.reset();
  }).catch((error) => {
    console.error(error);
    alert("Error al enviar ❌");
  });
});

</script>


</body>
</html>
