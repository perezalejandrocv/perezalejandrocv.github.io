<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTES</title>

  <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
  background-color: #4460AA;
  color: white;
  font-family: "Trebuchet MS", sans-serif;
  text-align: center;
}

    .contenedor {
      width: 100%;
      max-width: 500px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    label {
      font-size: 20px;
    }

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  font-family: "Trebuchet MS", sans-serif;

  transition: transform 0.2s ease, background-color 0.2s ease;
}

button:hover {
  transform: scale(1.1);
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 18px;
  padding: 10px;
  font-family: "Trebuchet MS", sans-serif;

  background-color: white !important;
  color: black;
  border: none;
  border-radius: 5px;

  -webkit-appearance: none;
}


  </style>
</head>

<body>

  <div class="contenedor">
    <h2>Enviar Notas</h2>

<form action="https://api.web3forms.com/submit" method="POST">

  <input type="hidden" name="access_key" value="28bf9573-eef3-41f9-a913-77917f9bfdf1">

  <textarea name="message" placeholder="Escribe tus notas..." required></textarea>

  <br><br>

  <label>
    <input type="checkbox" id="urgente">
    Urgente
  </label>

  <input type="hidden" name="subject" id="subjectField">

  <br><br>

  <button type="submit">Enviar</button>
</form>

  </div>


<script>
const textarea = document.querySelector("textarea");
const checkbox = document.getElementById("urgente");
const subjectField = document.getElementById("subjectField");

function actualizarSubject() {
  const message = textarea.value.trim();

  subjectField.value = checkbox.checked
    ? "🚨 " + message.substring(0, 100)
    : "📝 " + message.substring(0, 100);
}

// actualizar en tiempo real
textarea.addEventListener("input", actualizarSubject);
checkbox.addEventListener("change", actualizarSubject);

// asegurar valor antes de enviar (por si acaso)
document.querySelector("form").addEventListener("submit", actualizarSubject);
</script>



</body>
</html>
