<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ExcelMail Bridge</title>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>

<body>
    <h1>ExcelMail Bridge</h1>

    <button id="login">Iniciar sesión</button>
    <button id="logout">Cerrar sesión</button>

    <h2>Emails:</h2>
    <pre id="output"></pre>

    <script>
        const msalConfig = {
            auth: {
                clientId: "febd5697-6342-4a56-adfc-393e39a59c73",
                authority: "https://login.microsoftonline.com/consumers",
                redirectUri: "https://perezalejandrocv.github.io/excelmail/"
            },
            cache: {
                cacheLocation: "localStorage"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        const loginRequest = { scopes: [ "User.Read", "Mail.Read", "Files.ReadWrite" ] };
        const output = document.getElementById("output");

        async function getToken(account) {
            return await msalInstance.acquireTokenSilent({ ...loginRequest, account: account });
        }

        async function loginIfNeeded() {
            let account = msalInstance.getActiveAccount();
            if (!account) {
                const loginResponse = await msalInstance.loginPopup(loginRequest);
                account = loginResponse.account;
                msalInstance.setActiveAccount(account);
            }
            const tokenResponse = await getToken(account);
            window.accessToken = tokenResponse.accessToken;
            console.log("ACCESS TOKEN:", window.accessToken);
        }

        async function addEmailToExcel(email) {
            const tableId = "Tabla1"; // tu tabla ya creada en Excel
            const body = { values: [[ email.date, email.from, email.subject, email.folder || "", email.preview ]] };

            await fetch(
                `https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables/${tableId}/rows/add`,
                {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + accessToken,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                }
            );
        }







async function getFolderName(folderId) {
    const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/mailFolders/${folderId}`,
        { headers: { "Authorization": "Bearer " + window.accessToken } }
    );

    if (!res.ok) return folderId;

    const data = await res.json();
    return data.displayName;
}

// Función para limpiar HTML y dejar solo texto
function stripHtml(html) {
    const div = document.createElement("div");
    div.innerHTML = html || "";
    return div.textContent || div.innerText || "";
}

async function loadEmails() {
    output.innerText = "Cargando emails...";

    const res = await fetch(
        "https://graph.microsoft.com/v1.0/me/messages?$top=10&$select=subject,from,receivedDateTime,parentFolderId,body",
        { headers: { "Authorization": "Bearer " + window.accessToken } }
    );

    const data = await res.json();

    for (const msg of data.value) {
        const folderName = await getFolderName(msg.parentFolderId);

        // Solo la fecha AAAA-MM-DD
        const shortDate = msg.receivedDateTime.split("T")[0];

        await addEmailToExcel({
            date: shortDate,
            from: msg.from?.emailAddress?.name + " <" + msg.from?.emailAddress?.address + ">",
            subject: msg.subject,
            folder: folderName,
            preview: stripHtml(msg.body?.content)
        });
    }

    output.innerText += "\nEmails cargados en Excel.";
}
















        // --- Funciones de prueba que ya tenías ---
        async function testDrive(token) {
            const response = await fetch("https://graph.microsoft.com/v1.0/me/drive", { headers: { Authorization: `Bearer ${token}` } });
            const text = await response.text();
            console.log("DRIVE RESPONSE:", text);
            output.innerText += "\n\n--- DRIVE TEST ---\n" + text;
        }

        async function createTestFile(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/test.txt:/content",
                { method: "PUT", headers: { "Authorization": `Bearer ${token}`, "Content-Type": "text/plain" }, body: "Hola desde ExcelMail" }
            );
            const text = await response.text();
            console.log("CREATE FILE RESPONSE:", text);
            output.innerText += "\n\n--- CREATE FILE ---\n" + text;
        }

        async function findExcel(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx",
                { headers: { "Authorization": `Bearer ${token}` } }
            );
            const text = await response.text();
            console.log("FIND EXCEL RESPONSE:", text);
        }

        async function testWorkbook(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook",
                { headers: { Authorization: "Bearer " + token } }
            );
            const text = await response.text();
            console.log("WORKBOOK RESPONSE:", text);
        }

        async function testWorksheets(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/worksheets",
                { headers: { Authorization: "Bearer " + token } }
            );
            const text = await response.text();
            console.log("WORKSHEETS RESPONSE:", text);
        }

        async function writeCell(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/worksheets('Hoja1')/range(address='A1')",
                { method: "PATCH", headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ values: [["PRUEBA GRAPH"]] }) }
            );
            const text = await response.text();
            console.log("WRITE CELL RESPONSE:", text);
        }

        async function testTables(token) {
            const response = await fetch(
                "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables",
                { headers: { Authorization: "Bearer " + token } }
            );
            const text = await response.text();
            console.log("TABLES RESPONSE:", text);
        }

        // --- Botones login/logout ---
        document.getElementById("login").onclick = async () => {
            try {
                await loginIfNeeded();
                await loadEmails();
                await testDrive(accessToken);
                await createTestFile(accessToken);
                await findExcel(accessToken);
                await testWorkbook(accessToken);
                await testWorksheets(accessToken);
                await writeCell(accessToken);
                await testTables(accessToken);
            } catch (err) {
                console.error(err);
                output.innerText = "Error: " + err.message;
            }
        };

        document.getElementById("logout").onclick = () => {
            msalInstance.logoutPopup();
        };

        // --- Al cargar la página ---
        window.addEventListener('load', async () => {
            try {
                await loginIfNeeded();
                await loadEmails();
            } catch (err) {
                console.error(err);
                output.innerText = "Error al cargar emails automáticamente: " + err.message;
            }
        });
    </script>
</body>
</html>
