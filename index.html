<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No disponible</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .mensaje {
            padding: 20px;
        }

        .es {
            font-size: 2.5rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 25px;
        }

        .en {
            font-size: 2rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="mensaje">
        <div class="es">
            Ahora no estoy disponible.<br>
            Disculpe las molestias.
        </div>

        <div class="en">
            I am currently unavailable.<br>
            Sorry for the inconvenience.
        </div>
    </div>
</body>
</html>
