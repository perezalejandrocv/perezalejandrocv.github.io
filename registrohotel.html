<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario Registro Hotel</title>
</head>
<body>
  <form id="formulario">
    <input type="text" name="NOMBRE" placeholder="NOMBRE" required>
    <input type="text" name="DNI" placeholder="DNI" required>
    <input type="date" name="FECHA_ENTRADA" required>
    <input type="date" name="FECHA_SALIDA" required>
    <input type="tel" name="TELEFONO" placeholder="TELEFONO" required>
    <input type="email" name="EMAIL" placeholder="EMAIL" required>
    <button type="submit">Enviar</button>
  </form>

  <!-- Script al final para asegurarnos de que el DOM ya está cargado -->
  <script>
    const form = document.getElementById("formulario");
    console.log("FORMULARIO ENCONTRADO:", form); // Confirma que el listener se engancha

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      console.log("FORMULARIO ENVIADO"); // Confirma que el submit se ejecuta

      // Captura todos los campos automáticamente
      const datos = Object.fromEntries(new FormData(this).entries());
      console.log("DATOS A ENVIAR:", datos);

      try {
        const respuesta = await fetch(
          "https://webhook.latenode.com/94387/prod/4e3a4639-3a05-4547-8da0-879c7fee9c52",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
          }
        );

        console.log("Respuesta Latenode:", respuesta.status);
        alert("Datos enviados correctamente");
        this.reset();

      } catch (err) {
        console.error("Error de conexión:", err);
        alert("Error de conexión");
      }
    });
  </script>
</body>
</html>
