<form id="formulario">
  <input type="text" name="Nombre" placeholder="Nombre" required>
  <input type="text" name="DNI" placeholder="DNI" required>
  <input type="date" name="Fecha Entrada" required>
  <input type="date" name="Fecha Salida" required>
  <input type="tel" name="Teléfono" placeholder="Teléfono" required>
  <input type="email" name="Email" placeholder="Email" required>
  <button type="submit">Enviar</button>
</form>

<script>
document.getElementById("formulario").addEventListener("submit", async function(e) {
  e.preventDefault();

  // Función para formatear fechas a DD/MM/YYYY
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const day = String(d.getDate()).padStart(2,"0");
    const month = String(d.getMonth()+1).padStart(2,"0");
    const year = d.getFullYear();
    return `${day}/${month}/${year}`;
  }

  const datos = {
    Nombre: this.Nombre.value || "",
    DNI: this.DNI.value || "",
    "Fecha Entrada": formatDate(this.Entrada.value),
    "Fecha Salida": formatDate(this.Salida.value),
    "Teléfono": this.Telefono.value || "",
    Email: this.Email.value || ""
  };

  try {
    const response = await fetch("https://hook.eu1.make.com/s1iuz5nm1sg2bjrdiur3a9rfbnjpf56s", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(datos)
    });

    if (response.ok) {
      alert("Datos enviados correctamente");
      this.reset();
    } else {
      alert("Error al enviar datos. Intenta de nuevo.");
    }
  } catch (err) {
    console.error(err);
    alert("Error de conexión. Intenta más tarde.");
  }
});
</script>
