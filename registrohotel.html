<form id="formulario">
  <input type="text" name="NOMBRE" placeholder="NOMBRE" required>
  <input type="text" name="DNI" placeholder="DNI" required>
  <input type="date" name="FECHA_ENTRADA" required>
  <input type="date" name="FECHA_SALIDA" required>
  <input type="tel" name="TELEFONO" placeholder="TELEFONO" required>
  <input type="email" name="EMAIL" placeholder="EMAIL" required>
  <button type="submit">Enviar</button>
</form>

<script>
console.log("SCRIPT CARGADO");

document.getElementById("formulario").addEventListener("submit", async function(e) {
  e.preventDefault();
  console.log("FORM SUBMIT DETECTADO");

  const fila = [
    this.elements["NOMBRE"].value.trim(),
    this.elements["DNI"].value.trim(),
    this.elements["FECHA_ENTRADA"].value,
    this.elements["FECHA_SALIDA"].value,
    this.elements["TELEFONO"].value.trim(),
    this.elements["EMAIL"].value.trim()
  ];

  console.log("Fila a enviar:", fila);
  console.log("ANTES DEL FETCH");

  try {
    await fetch("https://hook.eu1.make.com/s1iuz5nm1sg2bjrdiur3a9rfbnjpf56s", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(fila)
    });

    console.log("FETCH EJECUTADO");
    alert("Datos enviados (verificar en Make)");
    this.reset();

  } catch (err) {
    console.error("Error de conexión:", err);
    alert("Error de conexión");
  }
});
</script>
