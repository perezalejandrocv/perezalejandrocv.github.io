<form id="formulario">
  <input type="text" name="NOMBRE" placeholder="NOMBRE" required>
  <input type="text" name="DNI" placeholder="DNI" required>
  <input type="date" name="FECHA_ENTRADA" required>
  <input type="date" name="FECHA_SALIDA" required>
  <input type="tel" name="TELEFONO" placeholder="TELEFONO" required>
  <input type="email" name="EMAIL" placeholder="EMAIL" required>
  <button type="submit">Enviar</button>
</form>

<script>
console.log("SCRIPT CARGADO");

document.getElementById("formulario").addEventListener("submit", async function(e) {
  e.preventDefault();
  console.log("FORM SUBMIT DETECTADO");

  const datos = {
    NOMBRE: this.elements["NOMBRE"].value.trim(),
    DNI: this.elements["DNI"].value.trim(),
    FECHA_ENTRADA: this.elements["FECHA_ENTRADA"].value,
    FECHA_SALIDA: this.elements["FECHA_SALIDA"].value,
    TELEFONO: this.elements["TELEFONO"].value.trim(),
    EMAIL: this.elements["EMAIL"].value.trim()
  };

  console.log("JSON a enviar:", datos);

  try {
    await fetch("https://webhook.latenode.com/94387/dev/f0160f6a-59f6-407f-a01a-038aa74e8c96", {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(datos)
    });

    console.log("FETCH EJECUTADO");
    alert("Datos enviados (verificar en Make)");
    this.reset();

  } catch (err) {
    console.error("Error de conexión:", err);
    alert("Error de conexión");
  }
});
</script>
