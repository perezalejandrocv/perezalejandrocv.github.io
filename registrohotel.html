<form id="formulario">
  <input type="text" name="NOMBRE" placeholder="NOMBRE" required>
  <input type="text" name="DNI" placeholder="DNI" required>
  <input type="date" name="FECHA_ENTRADA" required>
  <input type="date" name="FECHA_SALIDA" required>
  <input type="tel" name="TELEFONO" placeholder="TELEFONO" required>
  <input type="email" name="EMAIL" placeholder="EMAIL" required>
  <button type="submit">Enviar</button>
</form>

<script>
console.log("SCRIPT CARGADO");

document.getElementById("formulario").addEventListener("submit", async function(e) {
  e.preventDefault();
  console.log("FORM SUBMIT DETECTADO");

  // Crear form-data para enviar al webhook
  const formData = new FormData();
  formData.append("NOMBRE", this.elements["NOMBRE"].value.trim());
  formData.append("DNI", this.elements["DNI"].value.trim());
  formData.append("FECHA_ENTRADA", this.elements["FECHA_ENTRADA"].value);
  formData.append("FECHA_SALIDA", this.elements["FECHA_SALIDA"].value);
  formData.append("TELEFONO", this.elements["TELEFONO"].value.trim());
  formData.append("EMAIL", this.elements["EMAIL"].value.trim());

  try {
    // Enviar al webhook de Latenode
    await fetch("TU_WEBHOOK_DE_LATENODE_AQUI", {
      method: "POST",
      body: formData
    });

    console.log("FETCH EJECUTADO");
    alert("Datos enviados correctamente a Excel vía Latenode");
    this.reset();

  } catch (err) {
    console.error("Error al enviar:", err);
    alert("Error de conexión");
  }
});
</script>
